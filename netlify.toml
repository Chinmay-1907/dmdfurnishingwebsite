[[redirects]]
  from = "https://www.dmdfurnishing.com/*"
  to = "https://dmdfurnishing.com/:splat"
  status = 301
  force = true


[build]
  publish = ".next"
  functions = "netlify/functions"

[dev]
  framework = "#custom"
  command = "npm start"
  targetPort = 3000
  port = 8888
  publish = "public"
